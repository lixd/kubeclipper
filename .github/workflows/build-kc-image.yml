name: build-kc-image

on:
  push:
    branches:
      - '*'

# This ensures that previous jobs for the branch are canceled when the branch is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-kc-image
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Set up Go 1.19
        uses: actions/setup-go@v2
        with:
          go-version: 1.19
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Get branch name
        id: extract_branch
        shell: bash
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_BASE_REF})"

      - name: Set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
        with:
          version: latest

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Docker login
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin

      - name: Run buildx
        run: |
          tag=latest
          if [[ "${{ steps.extract_branch.outputs.branch }}" =~ ^release-.* ]]; then
            IFS="-" read -ra items <<< "$(git describe)"
            if [[ ! ${#items[@]} -eq 0 ]]; then
               tag=$(echo ${items[0]}|sed 's/release-/v/')
            fi
          fi
          echo current tag is ${tag}
          #docker buildx build --platform linux/amd64,linux/arm64 --push --file ./Dockerfile -t lixd96/kc-server:${tag} .


